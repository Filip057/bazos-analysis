<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Comparison – Bazos Analysis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding: 20px; }
        .main-container { max-width: 900px; margin: 0 auto; }
        .card { box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); }
        #loading { display: none; }
        .spinner-border { width: 1.5rem; height: 1.5rem; }
        #resultsCard { display: none; }
        .percentile-display { font-size: 3rem; font-weight: bold; color: #0d6efd; }
        .stats-item { border-left: 4px solid #0d6efd; padding-left: 15px; margin-bottom: 15px; }
        .error-message { background-color: #f8d7da; border-left: 4px solid #dc3545; padding: 15px; margin: 15px 0; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="mb-3">
            <a href="/" class="text-decoration-none">&larr; Zpět na hlavní stránku</a>
        </div>

        <div class="card mb-4">
            <div class="card-body">
                <h1 class="card-title mb-4">Car Price Comparison</h1>
                <p class="text-muted">Porovnej cenu svého auta s podobnými nabídkami na trhu</p>

                <form id="carComparisonForm">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="brand" class="form-label">Značka</label>
                            <select id="brand" name="brand" class="form-select" required>
                                <option value="">— vyber značku —</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="model" class="form-label">Model</label>
                            <select id="model" name="model" class="form-select" required disabled>
                                <option value="">— nejdřív vyber značku —</option>
                            </select>
                        </div>
                        <div class="col-md-12">
                            <label for="price" class="form-label">Cena (CZK)</label>
                            <input type="number" id="price" name="price" class="form-control" placeholder="např. 150000" min="1" required>
                        </div>
                        <div class="col-md-6">
                            <label for="year" class="form-label">Rok výroby (volitelné)</label>
                            <input type="number" id="year" name="year" class="form-control" placeholder="např. 2015" min="1900" max="2030">
                        </div>
                        <div class="col-md-6">
                            <label for="y_plusminus" class="form-label">Rok +/- (volitelné)</label>
                            <input type="number" id="y_plusminus" name="y_plusminus" class="form-control" placeholder="např. 2" min="0" max="50">
                            <small class="form-text text-muted">Roky +/- od roku výroby</small>
                        </div>
                        <div class="col-md-6">
                            <label for="mileage" class="form-label">Nájezd km (volitelné)</label>
                            <input type="number" id="mileage" name="mileage" class="form-control" placeholder="např. 100000" min="0">
                        </div>
                        <div class="col-md-6">
                            <label for="m_pct_plusminus" class="form-label">Nájezd % +/- (volitelné)</label>
                            <input type="number" id="m_pct_plusminus" name="m_pct_plusminus" class="form-control" placeholder="např. 10" min="0" max="100">
                            <small class="form-text text-muted">Nájezd % +/- od tvého nájezdu</small>
                        </div>
                        <div class="col-12">
                            <button type="submit" class="btn btn-primary btn-lg w-100">
                                <span id="submitText">Porovnat cenu</span>
                                <span id="loading" class="spinner-border spinner-border-sm ms-2" role="status">
                                    <span class="visually-hidden">Loading...</span>
                                </span>
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <!-- Results Card -->
        <div id="resultsCard" class="card">
            <div class="card-body">
                <h2 class="card-title mb-4">Výsledky porovnání</h2>
                <div id="resultsContent"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/car-compare.js"></script>
</body>
</html>
